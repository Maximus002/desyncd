name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: CLI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: desyncd-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: desyncd-windows-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: desyncd-macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: desyncd-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p desyncd-cli

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/desyncd dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz desyncd

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\desyncd.exe dist\
          cd dist && Compress-Archive -Path desyncd.exe -DestinationPath ..\${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  build-gui:
    name: GUI - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: macos-aarch64
            os: macos-latest
          - platform: macos-x86_64
            os: macos-13
          - platform: linux-x86_64
            os: ubuntu-latest
          - platform: windows-x86_64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: crates/desyncd-gui/frontend
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build GUI
        working-directory: crates/desyncd-gui
        run: cargo tauri build

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desyncd-gui-${{ matrix.platform }}.dmg
          path: target/release/bundle/dmg/*.dmg

      - name: Upload Linux DEB
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desyncd-gui-${{ matrix.platform }}.deb
          path: target/release/bundle/deb/*.deb

      - name: Upload Windows EXE
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desyncd-gui-${{ matrix.platform }}.exe
          path: target/release/bundle/nsis/*.exe

  release:
    name: Create Release
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
