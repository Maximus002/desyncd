name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: CLI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: desyncd-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: desyncd-windows-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: desyncd-macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: desyncd-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p desyncd-cli

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/desyncd dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz desyncd

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\${{ matrix.target }}\release\desyncd.exe dist\
          Compress-Archive -Path dist\desyncd.exe -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  build-gui:
    name: GUI - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            os: macos-latest
            tauri_args: --target aarch64-apple-darwin
          - platform: linux-x86_64
            os: ubuntu-22.04
            tauri_args: ""
          - platform: windows-x86_64
            os: windows-latest
            tauri_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-${{ matrix.platform }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: crates/desyncd-gui/frontend
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build GUI
        working-directory: crates/desyncd-gui
        run: cargo tauri build ${{ matrix.tauri_args }}

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desyncd-gui-${{ matrix.platform }}
          path: |
            target/*/release/bundle/dmg/*.dmg
            target/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desyncd-gui-${{ matrix.platform }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desyncd-gui-${{ matrix.platform }}
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi

  release:
    name: Create Release
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
